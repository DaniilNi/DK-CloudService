<DOCTYPE html>
  <html lang="ru">
    
    <head>
      <meta carset="UTF-8">
      <title>Облачный проект</title>
      <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; backgroung-color: #f4f4f9; }
        .form-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #f4b400; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: dfa400; }
      </style>
    </head>
    
    <body>

      <div class="form-container">
        <h3></h3>
        <form id="feedbackForm">
          <input type="text" id="userName" placeholder="" required>
          <input type="email" id="userEmail" placeholder="" required>
          <button type="submit"></button>
        </form>
      </div>

      <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDfNDJWzFmXGLQSCiMcu8Th1hiHKFn8zew",
          authDomain: "dk-cloudservice.firebaseapp.com",
          projectId: "dk-cloudservice",
          storageBucket: "dk-cloudservice.firebasestorage.app",
          messagingSenderId: "693547692447",
          appId: "1:693547692447:web:f8e296855617d1dcd28daa",
          measurementId: "G-JB68T9ZG1M"
        };

        const app initializeApp (firebaseConfig);
        const db getFirestore(app);

        document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
          e.preventDefault();

          const nameInput = document.getElementById("userName").value;
          const emailInput = document.getElementById("userEmail").value;

          try {
            await addDoc(collection (db, "requests"), {
              name: nameInput,
              email: emailInput,
              timestamp: new Date(
                });
                alert("Готово! Данные созранены в Firebase.");
            document.getElementById("feedbackForm").reset();
          } catch (error) {
            console.error("Ошибка записи: ", error);
            alert("Ошибка при отправке.");
          }
        });
        </script>
    </body>
  </html>
