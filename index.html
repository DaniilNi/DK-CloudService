<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачное приложение</title>
    <style>
      .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            padding: 25px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            font-size: 22px;
            color: #1a1a1a;
        }

        #myInfo {
            color: #555;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .status-btn {
            border: none;
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .status-btn:hover {
            opacity: 0.9;
        }

        /* Цвета кнопок как на фото */
        .btn-study { background-color: #2ba24c; }
        .btn-coffee { background-color: #ffb800; }
        .btn-game { background-color: #008f9f; }
        .btn-home { background-color: #6c757d; }

        /* Список группы */
        #groupList {
            margin-top: 15px;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .user-item:last-child {
            border-bottom: none;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .user-details strong {
            font-size: 18px;
            color: #000;
        }

        .user-details small {
            color: #777;
            font-size: 14px;
        }
    </style>
  </head>
  <body>
    <div class="card">
        <h2>Мой профиль</h2>
        <div id="myInfo">Загрузка...</div>
        
        <div class="button-grid">
            <button class="status-btn btn-study" onclick="changeStatus('📚 Учусь', '#2ba24c')">📚 Учусь</button>
            <button class="status-btn btn-coffee" onclick="changeStatus('☕ Кофе-брейк', '#ffb800')">☕ Кофе</button>
            <button class="status-btn btn-game" onclick="changeStatus('🎮 В игре', '#008f9f')">🎮 В игре</button>
            <button class="status-btn btn-home" onclick="changeStatus('🏠 Дома', '#6c757d')">🏠 Дома</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="groupList">
            </div>
    </div>
    
    <script type="module">


      
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm
      const URL 'https://rncerhgizyjhovbdpqnl.supabase.co';
      const KEY *sb_publishable_ThtftS6uBeaKf8FyndIFTg_00HMJ5yh';
      const supabase = createClient(URL, KEY);
      
      const MY_ID = 'ff177d7f-8d33-45b1-9b63-c55486347310';
      
      window.changeStatus = async (text, color) => {
        const { error} = await supabase
          .from('profiles')
          .update({ status: text, color: color })
          .eq('id', MY_ID);
        
        if (error) {
          alert("Ошибка! Проверьте RLS политики в Supabase.");
          console.error(error);
        } else {
          fetchGroup();
        }
      };
      
      async function fetchGroup() {
        const { data, error } = await supabase
          .from('profiles')
          .select(***)
          .order('username', { ascending: true });
        
        if (error) return console.error(error);
        
        const list document.getElementById('groupList');
        list.innerHTML = data.map(user => `
          <div class="user-item">
          <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
          <div style="flex-grow: 1;">
          <strong>${user.username}</strong><br>
          <small style="color: #666;">${user.status || 'Status not set'}</small>
          </div>
          </div>
          `).join('');
            
        const me = data.find(u => u.id === MY_ID);
        if (me) document.getElementById('myInfo').innerText = "You are logged in as: ${me.username}";
      }
      
      fetchGroup();
      
      setInterval(fetchGroup, 5000);
    </script>
  </body>
</html>
